<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded app tile -->
  <rect width="100" height="100" rx="26" fill="url(#bg)"/>
  <rect width="100" height="100" rx="26" fill="url(#shine)"/>

  <!-- Todo list lines -->
  <g stroke="#FFFFFF" stroke-linecap="round" stroke-width="6">
    <line x1="32" y1="35" x2="71" y2="35" opacity="0.95"/>
    <line x1="32" y1="51" x2="71" y2="51" opacity="0.5"/>
    <line x1="32" y1="67" x2="55" y2="67" opacity="0.32"/>
  </g>

  <!-- Check badge -->
  <circle cx="70" cy="68" r="18" fill="#FFFFFF"/>
  <path d="M62 68.5 L67.5 74 L78 62" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
